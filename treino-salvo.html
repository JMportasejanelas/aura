<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA - Treino Salvo</title>
  <link rel="stylesheet" href="login.css">
  <style>
    .page { max-width: 980px; }
    .card { padding: 32px; }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 32px;
      margin-bottom: 6px;
    }
    .page-header p {
      color: var(--muted);
      font-size: 15px;
      margin: 0;
    }
    .small-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34, 197, 94, 0.18);
      color: #d9f99d;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
    }
    .welcome { margin-bottom: 24px; color: var(--text); font-size: 16px; }
    .button-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .secondary-button, .logout-button {
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }
    .secondary-button:hover, .logout-button:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .saved-plan { display: grid; gap: 22px; }
    .day-card { padding: 22px; border-radius: 20px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(148, 163, 184, 0.12); }
    .day-card h2 { margin-top: 0; margin-bottom: 10px; }
    .day-card ul { margin: 0; padding: 0; list-style: none; display: grid; gap: 14px; }
    .day-card li { padding: 16px 18px; border-radius: 18px; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(148, 163, 184, 0.12); display: grid; gap: 12px; }
    .exercise-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .field-row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
    .field-row label { display: grid; gap: 6px; color: var(--text); font-size: 14px; }
    .field-row input { width: 100%; padding: 10px 12px; border-radius: 14px; border: 1px solid rgba(148, 163, 184, 0.18); background: rgba(15, 23, 42, 0.95); color: var(--text); outline: none; }
    .empty-state { padding: 22px; border-radius: 20px; background: rgba(34, 197, 94, 0.08); border: 1px solid rgba(34, 197, 94, 0.18); }
    @media (max-width: 720px) { .page-header { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="page-header">
        <div>
          <div class="small-tag">AURA</div>
          <h1>Treino salvo</h1>
          <p>Veja o seu plano semanal com séries, repetições e carga.</p>
        </div>
        <div class="button-row">
          <button class="secondary-button" id="back-button">Voltar para exercícios</button>
          <button class="secondary-button" id="logout-button">Sair</button>
        </div>
      </div>

      <div class="welcome" id="welcome">Carregando seus dados...</div>

      <div class="saved-plan" id="saved-plan"></div>

      <div class="instructions">
        Seu treino é salvo automaticamente no navegador. Aqui você pode preencher séries, repetições e carga para cada exercício selecionado.
      </div>
    </section>
  </main>

  <script type="module" src="treino-salvo.js"></script>
</body>
</html>
